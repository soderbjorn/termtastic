<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termtastic</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
    <header class="app-header">
        <!-- Toggle the left sidebar open/closed -->
        <button class="icon-button sidebar-toggle-btn" id="sidebar-toggle" type="button"
                title="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
        </button>
        <nav class="tab-bar" id="tab-bar">
            <!-- Sliding orange ring around the active tab. JS positions it to
                 match the active button's offset rect; CSS animates the
                 movement. Lives inside the tab bar so it scrolls with the
                 tab buttons. Skipped during the first paint (no width). -->
            <div class="tab-active-indicator" aria-hidden="true"></div>
        </nav>
        <div class="header-actions">
            <!-- Debug menu. Only shown on dev server (JS checks at boot). -->
            <div class="dropdown" id="debug-dropdown" style="display: none;">
                <button class="icon-button" id="debug-button" type="button" title="Debug">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v1h4"/>
                        <path d="M18 10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4"/>
                        <path d="M2 14h4"/>
                        <path d="M18 14h4"/>
                        <path d="M2 18h4"/>
                        <path d="M18 18h4"/>
                        <rect x="8" y="10" width="8" height="10" rx="2"/>
                    </svg>
                </button>
                <div class="dropdown-menu" id="debug-menu" role="listbox"></div>
            </div>
            <!-- Arrange panes dropdown. Opens a menu of layout templates
                 (Grid, Primary Left, Columns, …) rendered as mini previews
                 that reflect the current pane count; click a tile to apply
                 it to the active tab. -->
            <div class="dropdown" id="layout-dropdown">
                <button class="icon-button" id="layout-button" type="button"
                        title="Arrange panes">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </button>
                <div class="dropdown-menu layout-menu" id="layout-menu" role="listbox"></div>
            </div>
            <!-- New window button. Opens the pane-type modal scoped to the
                 currently active tab, letting the user create a new pane
                 (terminal, file browser, git, linked view). The new pane
                 inherits cwd from the active tab's focused pane when one
                 exists, mirroring the previous per-pane "New window" button. -->
            <button class="icon-button" id="new-window-button" type="button"
                    title="New window">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="1.5"/>
                    <line x1="12" y1="3" x2="12" y2="21"/>
                    <line x1="15" y1="12" x2="21" y2="12"/>
                    <line x1="18" y1="9" x2="18" y2="15"/>
                </svg>
            </button>
            <!-- Appearance toggle. Cycles Auto → Dark → Light. -->
            <button class="icon-button" id="appearance-toggle" type="button"
                    title="Appearance: Auto">
            </button>
            <!-- Theme button. Opens the Theme Manager panel. Tooltip reflects
                 the currently-active theme for the live appearance mode. -->
            <button class="icon-button" id="theme-button" type="button"
                    title="Active theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.65-.75 1.65-1.69 0-.44-.18-.83-.44-1.12-.29-.29-.44-.65-.44-1.13a1.64 1.64 0 0 1 1.67-1.67h2c3.05 0 5.55-2.5 5.55-5.55C21.97 6.01 17.46 2 12 2z"/>
                    <circle cx="6.5" cy="12.5" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="8.5" cy="7.5" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="13.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="17.5" cy="10.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
            </button>
            <!-- Settings cogwheel. Opens the settings modal. -->
            <button class="icon-button" id="settings-button" type="button"
                    title="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <!-- About info button. Opens the about dialog. -->
            <button class="icon-button" id="about-button" type="button"
                    title="About Termtastic">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </button>
        </div>
    </header>
    <div class="app-body">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-divider" id="sidebar-divider"></div>
        <main class="terminal-wrap" id="terminal-wrap"></main>
    </div>
    <footer id="claude-usage-bar" class="claude-usage-bar" style="display: none;"></footer>
</div>
<script type="application/javascript" src="web.js"></script>
</body>
</html>
