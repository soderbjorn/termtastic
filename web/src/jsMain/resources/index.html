<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termtastic</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
    <header class="app-header">
        <!-- Toggle the left sidebar open/closed -->
        <button class="icon-button sidebar-toggle-btn" id="sidebar-toggle" type="button"
                title="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
        </button>
        <nav class="tab-bar" id="tab-bar">
            <!-- Sliding orange ring around the active tab. JS positions it to
                 match the active button's offset rect; CSS animates the
                 movement. Lives inside the tab bar so it scrolls with the
                 tab buttons. Skipped during the first paint (no width). -->
            <div class="tab-active-indicator" aria-hidden="true"></div>
        </nav>
        <div class="header-actions">
            <!-- Debug menu. Only shown on dev server (JS checks at boot). -->
            <div class="dropdown" id="debug-dropdown" style="display: none;">
                <button class="icon-button" id="debug-button" type="button" title="Debug">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v1h4"/>
                        <path d="M18 10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4"/>
                        <path d="M2 14h4"/>
                        <path d="M18 14h4"/>
                        <path d="M2 18h4"/>
                        <path d="M18 18h4"/>
                        <rect x="8" y="10" width="8" height="10" rx="2"/>
                    </svg>
                </button>
                <div class="dropdown-menu" id="debug-menu" role="listbox"></div>
            </div>
            <!-- Settings cogwheel. Opens the settings modal. -->
            <button class="icon-button" id="settings-button" type="button"
                    title="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </header>
    <div class="app-body">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-divider" id="sidebar-divider"></div>
        <main class="terminal-wrap" id="terminal-wrap"></main>
    </div>
    <footer id="claude-usage-bar" class="claude-usage-bar" style="display: none;"></footer>
</div>
<script type="application/javascript" src="web.js"></script>
</body>
</html>
